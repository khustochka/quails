version: 2

updates:
  - package-ecosystem: "bundler"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "friday"
    allow:
      - dependency-type: "all"
    open-pull-requests-limit: 0
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "friday"
    allow:
      - dependency-type: "all"
    open-pull-requests-limit: 0
  - package-ecosystem: github-actions
    # "/" only covers .github/workflows; composite actions need their own entries
    directories:
      - "/"
      - "/.github/actions/*"
    schedule:
      interval: monthly
